# QASA + chain-of-thought prompt (prompts/qasa_cot.json) with 5 retrieved passages per example.
# Prereq: build eval JSON (top-5 GTR/TF-IDF within each paper) with 10 eval rows:
#   .venv/bin/python tools/prepare_qasa.py --eval_only --max_eval_examples 10 --topk 5 \
#     --eval_output data/qasa_eval_top5_n10.json --max_dataset_examples 500 --ranker gtr
# Use enough --max_dataset_examples that ≥10 items survive filtering (too small, e.g. 8 rows, may fail).
# For a fast CPU check, use: --ranker tfidf
---
prompt_file: prompts/qasa_cot.json
eval_file: data/qasa_eval_top5_n10.json
shot: 3
ndoc: 5
dataset_name: qasa
tag: cot_top5_eval10
model: google/gemma-4-31b-it:free
openai_api: false
openrouter_api: true
openrouter_reasoning: false
temperature: 0.5
top_p: 1.0
max_new_tokens: 768
max_new_tokens_round1: 500
max_new_tokens_round2: 500
max_length: 8192
num_samples: 1
seed: 42
